<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS(S) Exam Schedule</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; background-color: #004085; color: #333; margin: 0; }
        .container { max-width: 1400px; margin: auto; }
        .header-section { color: white; text-align: center; padding: 15px 0; }
        .header-section h1 { color: #f1c40f; margin-bottom: 5px; text-transform: uppercase; }
        .reminder { color: #ffda6a; font-size: 0.85em; font-style: italic; }
        #lastUpdated { display: inline-block; background: rgba(255, 255, 255, 0.1); padding: 4px 12px; border-radius: 20px; font-size: 0.75em; margin-top: 5px; border: 1px solid rgba(255, 255, 255, 0.2); }
        .controls { background: #f8f9fa; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 20px; text-align: center; }
        button { padding: 10px 20px; cursor: pointer; border: 2px solid #f1c40f; border-radius: 6px; background: #f1c40f; color: #004085; font-weight: bold; font-size: 15px; margin: 5px; }
        button.secondary { background: transparent; color: #f1c40f; }
        input { padding: 10px; width: 220px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; text-transform: uppercase; }
        #tableContainer { background: white; border-radius: 8px; overflow: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.2); max-height: 75vh; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #e9ecef; color: #004085; font-weight: bold; font-size: 13px; border-bottom: 2px solid #004085; padding: 10px; text-align: left; position: sticky; top: 0; z-index: 10; }
        td { border-bottom: 1px solid #eee; padding: 8px 10px; font-size: 14px; vertical-align: top; }
        .full-view-row td:nth-child(2), .full-view-row td:nth-child(3) { font-weight: bold !important; color: #000 !important; background-color: transparent !important; }
        .full-view-row td { font-size: 11px; min-width: 90px; max-width: 180px; word-wrap: break-word; overflow-wrap: break-word; white-space: normal; line-height: 1.3; border-right: 1px solid #f0f0f0; }
        .highlight-header { font-weight: 900; color: #004085; background-color: #f0f4f8; }
        .empty-row td { height: 2px; padding: 0; font-size: 1px; background-color: #f1f1f1; color: transparent; border: none; }
        .suggestion-box { background: #fff3cd; color: #856404; padding: 15px; border-radius: 8px; margin-top: 10px; display: none; text-align: center; border: 1px solid #ffeeba; }
        .suggestion-link { color: #004085; font-weight: bold; text-decoration: underline; cursor: pointer; margin: 5px 15px; display: inline-block; padding: 5px; border: 1px solid #00408533; border-radius: 4px; }
        .comm-label { font-weight: bold; color: #004085; text-transform: uppercase; font-size: 0.75em; display: block; margin-top: 4px; border-bottom: 1px solid #eee; }
        .comm-name { display: block; padding-left: 5px; padding-bottom: 4px; font-size: 0.9em; }
        #resultCount { margin-bottom: 10px; font-weight: bold; color: white; text-align: center; font-size: 0.9em; }
        @media print { .controls, .header-section, .secondary, .suggestion-box { display: none; } body { background: white; } #tableContainer { max-height: none; box-shadow: none; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header-section">
        <h1>SAS(S) Exam Schedule</h1>
        <p class="reminder">⚠️ Enter name as per official roster.</p>
        <div id="lastUpdated">Checking for updates...</div>
    </div>
    <div class="controls">
        <input type="text" id="teacherName" placeholder="ENTER NAME..." onkeypress="if(event.key==='Enter') searchSchedule()">
        <button onclick="searchSchedule()">Find My Duties</button>
        <button class="secondary" onclick="toggleFullSchedule()">Full Master View</button>
        <button class="secondary" onclick="window.print()">Print</button>
        <div id="suggestionBox" class="suggestion-box">
            <div style="margin-bottom: 10px;"><b>No exact match found. Did you mean?</b></div>
            <div id="suggestionLinks"></div>
        </div>
    </div>
    <div id="resultCount"></div>
    <div id="tableContainer">
        <table id="mainTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>
<script>
    let masterData = [];
    let teacherList = new Set();

    window.onload = function() {
        fetch("master_schedule.csv").then(response => {
            const lastMod = response.headers.get("Last-Modified");
            if (lastMod) {
                const date = new Date(lastMod);
                document.getElementById('lastUpdated').innerText = "Last Updated: " + date.toLocaleString('en-SG', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
            }
            return response.text();
        }).then(csvText => {
            Papa.parse(csvText, {
                skipEmptyLines: true,
                complete: function(results) {
                    masterData = results.data;
                    for (let r = 0; r < masterData.length; r++) {
                        for (let c = 3; c < masterData[r].length; c++) {
                            let val = (masterData[r][c] || "").toString().trim();
                            if (val && val.length > 3 && !val.includes("Period") && !/\d/.test(val)) {
                                teacherList.add(val);
                            }
                        }
                    }
                }
            });
        });
    };

    function searchSchedule(manualName = null) {
        const inputField = document.getElementById('teacherName');
        const suggestionBox = document.getElementById('suggestionBox');
        let searchTerm = manualName ? manualName : inputField.value.trim();
        if (manualName) inputField.value = manualName;
        const searchLower = searchTerm.toLowerCase();
        
        suggestionBox.style.display = "none";
        document.getElementById('tableBody').innerHTML = "";
        if (!searchLower || searchLower.length < 2) return;
        
        let rawMatches = [];
        let exactMatchFound = false;

        for (let r = 0; r < masterData.length; r++) {
            for (let c = 3; c < masterData[r].length; c++) {
                let cellValue = (masterData[r][c] || "").toString().trim();
                // STRICT MATCH (Case Insensitive)
                if (cellValue.toLowerCase() === searchLower) {
                    exactMatchFound = true;
                    let currentClass = masterData[r][1] || "-";
                    let currentVenue = masterData[r][2] || "-";
                    let before = (masterData[r-1] && masterData[r-1][c]) ? masterData[r-1][c] : "---";
                    let after = (masterData[r+1] && masterData[r+1][c]) ? masterData[r+1][c] : "---";
                    let period = "N/A", startTime = "0000", endTime = "0000";
                    for (let checkR = r; checkR >= 0; checkR--) {
                        if (masterData[checkR][c] && masterData[checkR][c].toString().includes("Period")) {
                            period = masterData[checkR][c];
                            if (masterData[checkR + 2]) {
                                startTime = masterData[checkR + 2][c] || "0000";
                                endTime = masterData[checkR + 2][c+1] || "0000";
                            }
                            break;
                        }
                    }
                    rawMatches.push({ currentClass, currentVenue, period, startTime, endTime, before, after });
                }
            }
        }

        if (exactMatchFound) {
            rawMatches.sort((a, b) => parseInt(a.startTime) - parseInt(b.startTime));
            displayPersonal(mergeDuties(rawMatches));
        } else {
            document.getElementById('resultCount').innerText = "No exact match for '" + searchTerm + "'.";
            findSuggestions(searchLower);
        }
    }

    function mergeDuties(matches) {
        if (matches.length === 0) return [];
        let merged = [];
        let current = JSON.parse(JSON.stringify(matches[0]));
        for (let i = 1; i < matches.length; i++) {
            let next = matches[i];
            if (next.currentClass === current.currentClass && next.currentVenue === current.currentVenue) {
                current.endTime = next.endTime;
                current.period = current.period + " & " + next.period;
                current.after = next.after;
            } else { merged.push(current); current = JSON.parse(JSON.stringify(next)); }
        }
        merged.push(current);
        return merged;
    }

        function findSuggestions(typedName) {
        const suggestionBox = document.getElementById('suggestionBox');
        const suggestionLinks = document.getElementById('suggestionLinks');
        suggestionLinks.innerHTML = "";
        
        // 1. Squash the input to handle "jingting" vs "Jing Ting"
        let cleanTyped = typedName.toLowerCase().replace(/\s+/g, '');

        let suggestions = Array.from(teacherList).filter(t => {
            let lowerT = t.toLowerCase();
            let cleanT = lowerT.replace(/\s+/g, '');
            
            // CHECK 1: Does the squashed roster name contain the squashed search?
            if (cleanT.includes(cleanTyped)) return true;
            
            // CHECK 2: Is there a 1-character typo in the squashed strings?
            // (This catches "jinting" vs "jingting")
            if (levenshteinDistance(cleanT, cleanTyped) <= 1) return true;

            // CHECK 3: Check if the typo exists within a subset of the name
            // (e.g., is "jinting" close to "jingting" even if "Sin" is there?)
            let parts = lowerT.split(" ");
            let squashedParts = [];
            // Create combinations like ["sin", "jing", "ting", "sinjing", "jingting"]
            for(let i=0; i<parts.length; i++) {
                let combo = "";
                for(let j=i; j<parts.length; j++) {
                    combo += parts[j];
                    if (levenshteinDistance(combo, cleanTyped) <= 1) return true;
                }
            }
            
            return false;
        }).slice(0, 5);

        if (suggestions.length > 0) {
            suggestionBox.style.display = "block";
            suggestions.forEach(s => {
                let span = document.createElement('span');
                span.className = "suggestion-link";
                span.innerText = s;
                span.onclick = () => searchSchedule(s);
                suggestionLinks.appendChild(span);
            });
        }
    }


    function levenshteinDistance(a, b) {
        const matrix = Array.from({ length: b.length + 1 }, (_, i) => [i]);
        for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                matrix[i][j] = b[i-1] === a[j-1] ? matrix[i-1][j-1] : Math.min(matrix[i-1][j-1], matrix[i][j-1], matrix[i-1][j]) + 1;
            }
        }
        return matrix[b.length][a.length];
    }

    function displayPersonal(matches) {
        const head = document.getElementById('tableHead');
        const body = document.getElementById('tableBody');
        document.getElementById('resultCount').innerText = `Results for "${document.getElementById('teacherName').value}"`;
        head.innerHTML = `<tr><th>Period</th><th>Time</th><th>Class</th><th>Venue</th><th>Communication</th></tr>`;
        body.innerHTML = matches.map(m => `<tr><td><b>${m.period}</b></td><td>${m.startTime} - ${m.endTime}</td><td><b>${m.currentClass}</b></td><td>${m.currentVenue}</td><td><span class="comm-label">Before:</span><span class="comm-name">${m.before}</span><span class="comm-label">After:</span><span class="comm-name">${m.after}</span></td></tr>`).join('');
    }

    function toggleFullSchedule() {
        const head = document.getElementById('tableHead');
        const body = document.getElementById('tableBody');
        document.getElementById('suggestionBox').style.display = "none";
        document.getElementById('resultCount').innerText = "Full Master View";
        head.innerHTML = ""; 
        body.innerHTML = masterData.map((row) => {
            const hasData = row.some(cell => cell && cell.toString().trim().length > 0);
            const rowClass = hasData ? "full-view-row" : "empty-row";
            let cellsHTML = row.map((cell, idx) => {
                let cellText = (cell || '').toString();
                let isHeader = cellText.toLowerCase().includes('period') || cellText.toLowerCase().includes('time');
                let showHighlight = isHeader && idx !== 1 && idx !== 2;
                return `<td class="${showHighlight ? 'highlight-header' : ''}">${cellText}</td>`;
            }).join('');
            return `<tr class="${rowClass}">${cellsHTML}</tr>`;
        }).join('');
    }
</script>
</body>
</html>
