<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS(S) Exam Schedule</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        /* UI Appearance */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 15px; 
            background-color: #004085; /* Deep Blue */
            color: #333; 
            margin: 0;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .header-section {
            color: white;
            text-align: center;
            padding: 20px 0;
        }

        /* Yellow Title */
        .header-section h1 {
            color: #f1c40f;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .reminder {
            color: #ffda6a;
            font-size: 0.9em;
            font-style: italic;
            margin-top: 5px;
        }

        .controls { 
            background: #f8f9fa; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            margin-bottom: 20px;
            text-align: center;
        }

        /* Yellow Buttons */
        button { 
            padding: 12px 24px; 
            cursor: pointer; 
            border: 2px solid #f1c40f; 
            border-radius: 6px; 
            background: #f1c40f; 
            color: #004085; 
            font-weight: bold; 
            font-size: 16px;
            transition: all 0.2s;
        }
        button:hover {
            background: #d4ac0d;
            border-color: #d4ac0d;
        }
        button.secondary { 
            background: transparent; 
            color: #f1c40f; 
            margin-left: 10px; 
        }
        button.secondary:hover {
            background: #f1c40f;
            color: #004085;
        }

        input { 
            padding: 12px; 
            width: 250px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            font-size: 16px;
            margin-bottom: 10px;
        }

        /* Table Styling */
        #tableContainer {
            background: white;
            border-radius: 8px;
            overflow: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            max-height: 70vh; /* Limits height for full view scrolling */
        }
        
        table { width: 100%; border-collapse: collapse; background: white; }
        
        /* Bold Headers */
        th { 
            background: #e9ecef; 
            color: #004085; 
            font-weight: 800; 
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td { border: 1px solid #dee2e6; padding: 10px; text-align: left; }
        
        /* Specific Full View Bordering */
        .full-view-row td {
            border: 1px solid #888; /* Darker borders for the big grid */
            font-size: 12px;
            white-space: nowrap;
        }

        .context-info { font-size: 0.85em; color: #555; background: #fdfdfd; padding: 4px; border-radius: 4px; margin-top: 4px; }
        .conflict { background-color: #ffcfcf !important; color: #b71c1c; font-weight: bold; }
        #resultCount { margin: 15px 0; font-weight: bold; color: white; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>SAS(S) Exam Schedule</h1>
        <p>Search by teacher name to view specific duties.</p>
        <p class="reminder">⚠️ Reminder: Please type your name correctly as per the official roster.</p>
    </div>

    <div class="controls">
        <input type="text" id="teacherName" placeholder="Enter Teacher Name..." onkeypress="if(event.key==='Enter') searchSchedule()">
        <button onclick="searchSchedule()">Find My Duties</button>
        <button class="secondary" onclick="toggleFullSchedule()">Full Master View</button>
    </div>

    <div id="resultCount"></div>

    <div id="tableContainer">
        <table id="mainTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let masterData = [];

    window.onload = function() {
        Papa.parse("master_schedule.csv", {
            download: true,
            skipEmptyLines: true,
            complete: function(results) {
                masterData = results.data;
                console.log("Database Loaded.");
            }
        });
    };

    function searchSchedule() {
        const name = document.getElementById('teacherName').value.trim().toLowerCase();
        if (!name) return;
        
        let matches = [];

        for (let r = 6; r < masterData.length; r++) {
            for (let c = 3; c < masterData[r].length; c++) {
                let cellValue = (masterData[r][c] || "").toString();
                
                if (cellValue.toLowerCase().includes(name)) {
                    let currentClass = masterData[r][1] || "-";
                    let currentVenue = masterData[r][2] || "-";
                    
                    let before = (masterData[r-1] && masterData[r-1][c]) ? masterData[r-1][c] : "Start of day";
                    let after = (masterData[r+1] && masterData[r+1][c]) ? masterData[r+1][c] : "End of day";

                    let period = "N/A", startTime = "0000", endTime = "0000";
                    for (let checkR = r; checkR >= 0; checkR--) {
                        if (masterData[checkR][c] && masterData[checkR][c].toString().includes("Period")) {
                            period = masterData[checkR][c];
                            if (masterData[checkR + 2]) {
                                startTime = masterData[checkR + 2][c] || "0000";
                                endTime = masterData[checkR + 2][c+1] || "0000";
                            }
                            break;
                        }
                    }
                    matches.push({ currentClass, currentVenue, period, startTime, endTime, before, after });
                }
            }
        }

        matches.sort((a, b) => parseInt(a.startTime) - parseInt(b.startTime));
        displayPersonal(matches);
    }

    function displayPersonal(matches) {
        const head = document.getElementById('tableHead');
        const body = document.getElementById('tableBody');
        document.getElementById('resultCount').innerText = `Found ${matches.length} Duties for "${document.getElementById('teacherName').value}"`;
        
        head.innerHTML = `<tr><th>Time</th><th>Period</th><th>Class</th><th>Venue</th><th>Comm. (Before/After)</th></tr>`;
        
        body.innerHTML = matches.map((m, index) => {
            let isConflict = matches.some((other, i) => i !== index && other.startTime === m.startTime);
            return `
                <tr class="${isConflict ? 'conflict' : ''}">
                    <td><b>${m.startTime} - ${m.endTime}</b></td>
                    <td>${m.period}</td>
                    <td>${m.currentClass}</td>
                    <td>${m.currentVenue}</td>
                    <td>
                        <div class="context-info"><b>Prev:</b> ${m.before}</div>
                        <div class="context-info"><b>Next:</b> ${m.after}</div>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function toggleFullSchedule() {
        const head = document.getElementById('tableHead');
        const body = document.getElementById('tableBody');
        document.getElementById('resultCount').innerText = "Full Master Roster View";
        
        head.innerHTML = ""; 
        body.innerHTML = masterData.map((row) => `
            <tr class="full-view-row">
                ${row.map(cell => `<td>${cell || ''}</td>`).join('')}
            </tr>
        `).join('');
    }
</script>

</body>
</html>
